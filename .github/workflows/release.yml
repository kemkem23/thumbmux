# Release rail: push a source tag vX.Y.Z → this builds dists, runs the full
# test suite, and publishes an immutable vX.Y.Z-dist tag that consumers pin:
#   "thumbmux": "github:kemkem23/thumbmux#vX.Y.Z-dist"
# (bun blocks git-dep postinstall and skips workspace devDeps, so dists must
# ship inside the tag — build-on-install does not work for git dependencies.)
name: release-dist
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
permissions:
  contents: write
jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: bun install --frozen-lockfile
      - name: install Playwright Chromium
        run: ./node_modules/.bin/playwright install --with-deps chromium
      - run: bun test ./server/tests/*.test.ts ./core/tests/*.test.ts ./core/src/*.test.ts ./svelte/tests/*.test.ts ./demo/*.test.ts ./scripts/*.test.ts
      - name: demo builds
        run: cd demo && bun run build
      - name: canonical container e2e
        timeout-minutes: 20
        run: ./e2e/run-container.sh
        env:
          THUMBMUX_E2E_ARTIFACTS: ${{ runner.temp }}/thumbmux-e2e-release
      - name: retain e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thumbmux-e2e-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/thumbmux-e2e-release
          if-no-files-found: ignore
          retention-days: 7
      - name: build release dists
        run: bun run build:git-dist
      - name: root git-dist consumer smoke
        run: bun run smoke:git-dist
      - name: commit dists and push ${GITHUB_REF_NAME}-dist
        run: |
          git config user.name "thumbmux-release"
          git config user.email "noreply@github.com"
          # Dists ship prebuilt in this tag. The root artifact is read-only:
          # remove every lifecycle/demo/build script so no package manager
          # rebuilds it or advertises commands whose sources are not shipped.
          npm pkg delete scripts
          # npm packs git deps honoring .gitignore unless a files whitelist
          # exists — without this, the committed dists never reach consumers.
          npm pkg set exports='{"./core":{"types":"./git-dist/core/index.d.ts","import":"./git-dist/core/index.js"},"./server":{"types":"./git-dist/server/index.d.ts","import":"./git-dist/server/index.js"},"./svelte":{"types":"./git-dist/svelte/index.d.ts","svelte":"./git-dist/svelte/index.js"},"./package.json":"./package.json"}' --json
          npm pkg set files='["git-dist","docs"]' --json
          # Keep pristine scoped-package dists available to pack from this tag;
          # the root files whitelist still installs only git-dist + docs.
          git add -f core/dist server/dist svelte/dist git-dist package.json
          git commit -m "release: ${GITHUB_REF_NAME} + prebuilt git dist"
          git tag "${GITHUB_REF_NAME}-dist"
          git push origin "${GITHUB_REF_NAME}-dist"
