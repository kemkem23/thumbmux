name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: bun install --frozen-lockfile
      - name: install Playwright Chromium
        run: ./node_modules/.bin/playwright install --with-deps chromium
      - name: core unit tests
        run: bun test ./core/tests/ ./core/src/*.test.ts
      - name: protocol conformance (real tmux)
        run: bun test ./server/tests/
      - name: svelte + demo unit tests
        run: bun test ./svelte/tests/ ./demo/*.test.ts ./scripts/*.test.ts
      - name: demo builds
        run: cd demo && bun run build
      - name: canonical container e2e
        timeout-minutes: 20
        run: ./e2e/run-container.sh
        env:
          THUMBMUX_E2E_ARTIFACTS: ${{ runner.temp }}/thumbmux-e2e-ci
      - name: retain e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thumbmux-e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/thumbmux-e2e-ci
          if-no-files-found: ignore
          retention-days: 7
      - name: packages build & pack (publish readiness)
        run: |
          (cd core && bun run build && bun pm pack)
          (cd server && bun run build && bun pm pack)
          (cd svelte && bun run build && bun pm pack)
      - name: root git-dist consumer smoke
        run: bun run build:git-dist && bun run smoke:git-dist
