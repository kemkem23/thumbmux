name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: bun install
      - name: core unit tests
        run: bun test ./core/tests/ ./core/src/terminal-link.test.ts
      - name: protocol conformance (real tmux)
        run: bun test ./server/tests/
      - name: demo builds
        run: cd demo && bun run build
      - name: packages build & pack (publish readiness)
        run: |
          (cd core && bun run build && bun pm pack)
          (cd server && bun run build && bun pm pack)
          (cd svelte && bun run build && bun pm pack)
